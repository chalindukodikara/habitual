apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: postgres
  namespace: default
spec:
  owner:
    projectName: habitual

  componentType:
    name: deployment/database
    kind: ClusterComponentType

  parameters:
    port: 5432

  traits:
    - name: persistent-volume
      kind: ClusterTrait
      instanceName: data-storage
      parameters:
        volumeName: pg-data
        mountPath: /var/lib/postgresql/data
        containerName: main
