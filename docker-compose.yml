services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=habitualdb
      - DB_USER=appuser
      - DB_PASSWORD=apppass
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=habitualdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d habitualdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  cronjob:
    build: ./cronjob
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=habitualdb
      - DB_USER=appuser
      - DB_PASSWORD=apppass
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - cronjob

volumes:
  pgdata:
