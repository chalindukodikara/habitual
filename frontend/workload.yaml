apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: frontend

endpoints:
  - name: http
    port: 3000
    type: HTTP
    visibility:
      - external

dependencies:
  endpoints:
    - component: backend
      name: http
      visibility: project
      envBindings:
        address: API_URL
        host: API_HOST
        port: API_PORT
