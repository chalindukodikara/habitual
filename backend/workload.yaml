apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: backend

endpoints:
  - name: http
    port: 8080
    type: HTTP
    schemaFile: openapi.yaml
    visibility:
      - project

dependencies:
  endpoints:
    - component: postgres
      name: tcp
      visibility: project
      envBindings:
        host: DB_HOST
        port: DB_PORT

configurations:
  env:
    - name: PORT
      value: "8080"
    - name: DB_NAME
      value: habitualdb
    - name: DB_USER
      value: appuser
    - name: DB_PASSWORD
      value: apppass
