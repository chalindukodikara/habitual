apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: postgres

endpoints:
  - name: tcp
    port: 5432
    type: TCP
    visibility:
      - project

configurations:
  env:
    - name: POSTGRES_DB
      value: habitualdb
    - name: POSTGRES_USER
      value: appuser
    - name: POSTGRES_PASSWORD
      value: apppass
