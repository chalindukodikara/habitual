apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: cronjob

dependencies:
  endpoints:
    - component: postgres
      name: tcp
      visibility: project
      envBindings:
        host: DB_HOST
        port: DB_PORT

configurations:
  env:
    - name: DB_NAME
      value: habitualdb
    - name: DB_USER
      value: appuser
    - name: DB_PASSWORD
      value: apppass
