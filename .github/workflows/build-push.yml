name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - "demo/habitual/**"
  workflow_dispatch:

env:
  DOCKER_NAMESPACE: chalindukodikara
  TAG: latest

jobs:
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: demo/habitual/frontend
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}/habitual-frontend:${{ env.TAG }}

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: demo/habitual/backend
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}/habitual-backend:${{ env.TAG }}

  build-cronjob:
    name: Build & Push Cronjob
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cronjob
        uses: docker/build-push-action@v6
        with:
          context: demo/habitual/cronjob
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}/habitual-cronjob:${{ env.TAG }}
